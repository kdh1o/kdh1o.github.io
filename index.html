<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BYHS 1-4</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-50 text-gray-800">

<header class="bg-gradient-to-r from-slate-800 to-slate-600 text-white py-6 px-6 relative">
    <h1 class="text-2xl font-extrabold">📢 BYHS 1-4</h1>
    <button id="loginBtn" class="absolute right-6 top-6 text-xs border px-3 py-1 rounded">로그인</button>
</header>

<nav class="bg-white flex border-b">
    <button id="tab-exam" class="flex-1 py-4 tab-active">학업 일정</button>
    <button id="tab-board" class="flex-1 py-4 text-gray-500">게시판</button>
</nav>

<main class="max-w-4xl mx-auto p-4">

<!-- 일정 -->
<div id="content-exam">

<section class="card border-l-4 border-indigo-500">
<h2 class="title">📌 알림</h2>

<p id="exam-dday"></p>
<p id="nearest-assessment"></p>

</section>

<section class="card">
<h2 class="title">공지</h2>
<div id="notice-content"></div>
</section>

<section class="card">
<h2 class="title">수행평가</h2>
<table class="w-full">
<tbody id="assessment-list"></tbody>
</table>
</section>

<section class="card">
<h2 class="title">시험 범위</h2>
<div id="range-cards"></div>
</section>

</div>

<!-- 게시판 -->
<div id="content-board" class="hidden">

<textarea id="post-text" class="input"></textarea>
<button id="addPostBtn" class="btn-primary">작성</button>

<div id="post-list"></div>

</div>

</main>

<script type="module" src="script.js"></script>
</body>
</html>
