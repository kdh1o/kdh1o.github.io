<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리반 게시판</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKbxqZBW6NovbiJAFJGyZIQZfYIxGvbN8",
            authDomain: "byhs1-4.firebaseapp.com",
            projectId: "byhs1-4",
            storageBucket: "byhs1-4.firebasestorage.app",
            messagingSenderId: "734684323543",
            appId: "1:734684323543:web:fb7bd8c10e6cfcacabda92"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore();
        const provider = new GoogleAuthProvider();

        onAuthStateChanged(auth, (user) => {
            const loginBtn = document.getElementById('loginBtn');
            const writeSection = document.getElementById('writeSection');
            if (user) {
                loginBtn.innerText = `${user.displayName} (로그아웃)`;
                writeSection.classList.remove('hidden');
                loginBtn.onclick = () => signOut(auth);
            } else {
                loginBtn.innerText = "구글 로그인";
                writeSection.classList.add('hidden');
                loginBtn.onclick = () => signInWithPopup(auth, provider);
            }
        });

        window.savePost = async () => {
            const content = document.getElementById('postContent').value;
            if (!content) return alert("내용을 입력하세요!");

            try {
                await addDoc(collection(db, "posts"), {
                    text: content,
                    createdAt: new Date(),
                    user: auth.currentUser.displayName
                });
                document.getElementById('postContent').value = "";
            } catch (e) {
                alert("오류 발생: " + e.message);
            }
        };

        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('postList');
            list.innerHTML = "";
            snapshot.forEach((doc) => {
                const post = doc.data();
                list.innerHTML += `
                    <div class="bg-white p-5 rounded-2xl shadow-sm mb-4 border border-gray-100">
                        <div class="flex justify-between mb-2">
                            <span class="font-bold text-indigo-600 text-sm">${post.user}</span>
                        </div>
                        <p class="text-gray-800">${post.text}</p>
                    </div>
                `;
            });
        });
    </script>
</head>
<body class="bg-slate-50">
    <nav class="bg-white border-b p-4 sticky top-0 z-10 shadow-sm">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <h1 class="font-black text-indigo-600 text-xl">BYHS 1-4 📌</h1>
            <button id="loginBtn" class="text-sm font-bold bg-indigo-50 px-4 py-2 rounded-lg text-indigo-600"></button>
        </div>
    </nav>
    <main class="max-w-xl mx-auto p-4">
        <div id="writeSection" class="hidden mb-8">
            <textarea id="postContent" class="w-full p-4 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none resize-none" rows="3" placeholder="소식을 전해보세요..."></textarea>
            <button onclick="savePost()" class="w-full mt-2 bg-indigo-600 text-white font-bold py-3 rounded-2xl hover:bg-indigo-700 transition">게시물 올리기</button>
        </div>
        <div id="postList"></div>
    </main>
</body>
</html>
