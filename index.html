<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1-4반 시험 범위 공지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKbxqZBW6NovbiJAFJGyZIQZfYIxGvbN8",
            authDomain: "byhs1-4.firebaseapp.com",
            projectId: "byhs1-4",
            storageBucket: "byhs1-4.firebasestorage.app",
            messagingSenderId: "734684323543",
            appId: "1:734684323543:web:fb7bd8c10e6cfcacabda92"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore();
        const provider = new GoogleAuthProvider();

        // 실시간으로 시험 범위 데이터 가져오기
        const examDoc = doc(db, "info", "examRange");
        onSnapshot(examDoc, (doc) => {
            if (doc.exists()) {
                document.getElementById('examDisplay').innerText = doc.data().content;
                document.getElementById('editor').value = doc.data().content;
            } else {
                document.getElementById('examDisplay').innerText = "아직 등록된 범위가 없습니다.";
            }
        });

        // 로그인 상태에 따라 수정 UI 보여주기
        onAuthStateChanged(auth, (user) => {
            const adminSection = document.getElementById('adminSection');
            const loginBtn = document.getElementById('loginBtn');
            if (user) {
                adminSection.classList.remove('hidden');
                loginBtn.classList.add('hidden');
            } else {
                adminSection.classList.add('hidden');
                loginBtn.classList.remove('hidden');
            }
        });

        window.login = () => signInWithPopup(auth, provider);

        window.updateRange = async () => {
            const newContent = document.getElementById('editor').value;
            try {
                await setDoc(examDoc, { 
                    content: newContent,
                    lastUpdated: new Date(),
                    updatedBy: auth.currentUser.displayName 
                });
                alert("시험 범위가 업데이트 되었습니다!");
            } catch (e) {
                alert("수정 권한이 없습니다.");
            }
        };
    </script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black text-indigo-600">📝 시험 범위 공지</h1>
            <button id="loginBtn" onclick="login()" class="text-xs text-gray-400 hover:text-indigo-600">관리자 로그인</button>
        </div>

        <div class="bg-indigo-50 rounded-2xl p-6 mb-6">
            <p id="examDisplay" class="text-gray-800 whitespace-pre-wrap leading-relaxed font-medium text-lg">로딩 중...</p>
        </div>

        <div id="adminSection" class="hidden border-t pt-6">
            <p class="text-sm font-bold text-gray-500 mb-2">범위 수정하기</p>
            <textarea id="editor" class="w-full p-4 border rounded-xl mb-3 focus:ring-2 focus:ring-indigo-500 outline-none" rows="5"></textarea>
            <button onclick="updateRange()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition">내용 저장하기</button>
        </div>
    </div>
</body>
</html>
