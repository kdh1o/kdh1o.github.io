<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BYHS 1-4</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header class="site-header">
        <div class="header-inner">
            <div class="header-brand">
                <span class="brand-badge">Class</span>
                <h1 class="brand-title">1<span class="brand-dash">—</span>4</h1>
                <span class="brand-school">병점고등학교</span>
            </div>
            <button id="loginBtn" class="login-btn">
                <i class="fas fa-user-circle"></i>
                <span>관리자 로그인</span>
            </button>
        </div>
    </header>

    <!-- Nav -->
    <nav class="site-nav">
        <div class="nav-inner">
            <button id="tab-exam" class="nav-tab tab-active">
                <i class="fas fa-calendar-alt"></i>
                시험 &amp; 수행
            </button>
            <button id="tab-board" class="nav-tab">
                <i class="fas fa-comments"></i>
                자유 게시판
            </button>
        </div>
    </nav>

    <main class="site-main">

        <!-- ───── 시험 & 수행 탭 ───── -->
        <div id="content-exam">

            <!-- 상단 알림 배너 -->
            <section class="alert-banner">
                <div class="alert-grid">
                    <div class="alert-card alert-dday">
                        <span class="alert-label">중간고사</span>
                        <p id="exam-dday" class="alert-value">계산 중…</p>
                    </div>
                    <div class="alert-card alert-urgent">
                        <span class="alert-label"><i class="fas fa-fire"></i> 가장 가까운 수행평가</span>
                        <p id="nearest-assessment" class="alert-urgent-text">로딩 중…</p>
                    </div>
                </div>
            </section>

            <!-- 공지 + PL -->
            <section class="info-grid">
                <div class="info-card">
                    <div class="info-card-header">
                        <span class="info-icon icon-orange"><i class="fas fa-bullhorn"></i></span>
                        <h2 class="info-title">공지사항</h2>
                    </div>
                    <div id="notice-content" class="info-body whitespace-pre-wrap">내용을 불러오는 중…</div>
                </div>
                <div class="info-card">
                    <div class="info-card-header">
                        <span class="info-icon icon-cyan"><i class="fas fa-futbol"></i></span>
                        <h2 class="info-title">다음 부리미어리그</h2>
                    </div>
                    <div id="pl-content" class="info-body whitespace-pre-wrap">일정을 불러오는 중…</div>
                </div>
            </section>

            <!-- 수행평가 테이블 -->
            <section class="section-block">
                <h2 class="section-title">
                    <span class="section-pill pill-yellow"></span>
                    수행평가 일정
                </h2>
                <div class="table-wrap">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>과목</th>
                                <th>내용</th>
                                <th>마감</th>
                            </tr>
                        </thead>
                        <tbody id="assessment-list"></tbody>
                    </table>
                </div>
            </section>

            <!-- 시험 범위 -->
            <section class="section-block">
                <h2 class="section-title">
                    <span class="section-pill pill-green"></span>
                    시험 범위
                </h2>
                <div id="range-cards" class="range-grid"></div>
            </section>
        </div>

        <!-- ───── 게시판 탭 ───── -->
        <div id="content-board" class="hidden">
            <section class="board-wrap">
                <div class="board-header">
                    <h2 class="board-title">게시판</h2>
                </div>

                <div id="post-input-section" class="hidden post-composer">
                    <textarea id="post-text" class="post-textarea" rows="2" placeholder="반 친구들에게 하고 싶은 말을 남겨보세요…"></textarea>
                    <button id="addPostBtn" class="post-submit-btn">
                        <i class="fas fa-paper-plane"></i> 게시하기
                    </button>
                </div>

                <div id="post-login-msg" class="login-nudge">
                    <i class="fas fa-lock"></i>
                    <span>로그인하면 글을 남길 수 있습니다.</span>
                </div>

                <div id="post-list" class="post-list"></div>
            </section>
        </div>

        <!-- ───── 관리자 패널 ───── -->
        <section id="admin-panel" class="hidden admin-panel">
            <h2 class="admin-title">
                <i class="fas fa-tools"></i> 관리자 데이터 수정
            </h2>
            <div class="admin-grid">
                <label class="admin-label">중간고사 날짜
                    <input type="date" id="input-date" class="admin-input">
                </label>
                <label class="admin-label">수행평가 (과목|내용|날짜)
                    <textarea id="input-assessments" class="admin-input admin-textarea" placeholder="국어|독서 발표|2025-05-10"></textarea>
                </label>
                <label class="admin-label">시험 범위 (과목:내용)
                    <textarea id="input-ranges" class="admin-input admin-textarea" placeholder="수학:교과서 1~3단원"></textarea>
                </label>
                <label class="admin-label">공지사항
                    <textarea id="input-notice" class="admin-input admin-textarea" placeholder="공지 내용 입력"></textarea>
                </label>
                <label class="admin-label">PL 일정
                    <textarea id="input-pl" class="admin-input admin-textarea" placeholder="PL 일정 입력"></textarea>
                </label>
                <button id="saveBtn" class="admin-save-btn">
                    <i class="fas fa-save"></i> 서버에 저장하기
                </button>
            </div>
        </section>

    </main>

    <footer class="site-footer">
        <p>BYHS 1-4 · 2025</p>
    </footer>

    <script type="module" src="script.js"></script>
</body>
</html>
