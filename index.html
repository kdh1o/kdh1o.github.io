<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1-4반 통합 게시판</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .tab-active { border-bottom: 4px solid #4f46e5; color: #4f46e5; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <header class="bg-indigo-600 text-white py-6 px-4 shadow-lg relative">
        <div class="max-w-4xl mx-auto text-center">
            <h1 class="text-2xl font-bold">📢 1-4반 알림센터</h1>
            <button id="loginBtn" class="absolute top-4 right-4 text-xs opacity-60 hover:opacity-100 border border-white px-2 py-1 rounded">관리자 로그인</button>
        </div>
    </header>

    <nav class="bg-white shadow-sm sticky top-0 z-20">
        <div class="max-w-4xl mx-auto flex">
            <button onclick="switchTab('exam')" id="tab-exam" class="flex-1 py-4 text-center tab-active transition">🗓️ 시험 & 수행</button>
            <button onclick="switchTab('board')" id="tab-board" class="flex-1 py-4 text-center text-gray-500 transition">💬 자유 게시판</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 mt-4">
        
        <div id="content-exam">
            <section class="bg-white rounded-2xl shadow-md p-6 mb-6 border-l-8 border-indigo-500">
                <h2 class="text-lg font-bold mb-4 text-gray-700">📌 주요 알림</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-indigo-50 p-4 rounded-xl">
                        <p class="text-xs text-indigo-400 font-bold mb-1">중간고사 D-Day</p>
                        <p id="exam-dday" class="text-2xl font-black text-indigo-600">계산 중...</p>
                    </div>
                    <div class="bg-red-50 p-4 rounded-xl md:col-span-2">
                        <p class="text-xs text-red-400 font-bold mb-1">🔥 가장 가까운 수행평가</p>
                        <p id="nearest-assessment" class="text-lg font-bold text-red-600 italic">로딩 중...</p>
                    </div>
                </div>
            </section>

            <section class="mb-8">
                <h2 class="text-xl font-bold mb-4 flex items-center"><span class="bg-yellow-400 w-1.5 h-6 mr-2 rounded-full"></span>수행평가 일정</h2>
                <div class="overflow-x-auto rounded-xl shadow-sm border bg-white">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 text-gray-500 text-sm">
                            <tr><th class="p-4">과목</th><th class="p-4">내용</th><th class="p-4">마감</th></tr>
                        </thead>
                        <tbody id="assessment-list" class="divide-y text-sm"></tbody>
                    </table>
                </div>
            </section>

            <section>
                <h2 class="text-xl font-bold mb-4 flex items-center"><span class="bg-green-400 w-1.5 h-6 mr-2 rounded-full"></span>시험 범위</h2>
                <div id="range-cards" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            </section>
        </div>

        <div id="content-board" class="hidden">
            <section class="bg-white rounded-2xl shadow-md p-6">
                <h2 class="text-xl font-bold mb-4">💬 우리반 한마디</h2>
                <div id="post-input-section" class="hidden mb-6">
                    <textarea id="post-text" class="w-full p-4 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" rows="2" placeholder="친구들에게 남길 말을 적어보세요!"></textarea>
                    <button onclick="addPost()" class="w-full mt-2 bg-indigo-600 text-white font-bold py-3 rounded-xl">게시하기</button>
                </div>
                <div id="post-login-msg" class="text-center py-4 text-gray-400 text-sm border-2 border-dashed rounded-xl mb-6">
                    로그인하면 글을 남길 수 있습니다.
                </div>
                <div id="post-list" class="space-y-4"></div>
            </section>
        </div>

        <section id="admin-panel" class="hidden mt-10 p-6 bg-gray-900 rounded-3xl text-white">
            <h2 class="text-lg font-bold mb-4 text-yellow-400">🛠️ 관리자 데이터 수정</h2>
            <div class="grid grid-cols-1 gap-4 text-sm">
                <input type="date" id="input-date" class="bg-gray-800 p-2 rounded border-none">
                <textarea id="input-assessments" class="bg-gray-800 p-2 rounded h-24" placeholder="과목|내용|날짜 (한 줄에 하나씩)"></textarea>
                <textarea id="input-ranges" class="bg-gray-800 p-2 rounded h-24" placeholder="과목:상세내용 (한 줄에 하나씩)"></textarea>
                <button onclick="saveData()" class="bg-yellow-500 text-black font-bold py-2 rounded">서버에 저장하기</button>
            </div>
        </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKbxqZBW6NovbiJAFJGyZIQZfYIxGvbN8",
            authDomain: "byhs1-4.firebaseapp.com",
            projectId: "byhs1-4",
            storageBucket: "byhs1-4.firebasestorage.app",
            messagingSenderId: "734684323543",
            appId: "1:734684323543:web:fb7bd8c10e6cfcacabda92"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore();
        const provider = new GoogleAuthProvider();

        const ADMIN_EMAIL = "kdh1o.edu@gmail.com"; // 도현님 이메일
        const dataDoc = doc(db, "classData", "main");

        // 탭 전환 로직
        window.switchTab = (tab) => {
            document.getElementById('content-exam').classList.toggle('hidden', tab !== 'exam');
            document.getElementById('content-board').classList.toggle('hidden', tab !== 'board');
            document.getElementById('tab-exam').className = tab === 'exam' ? 'flex-1 py-4 text-center tab-active' : 'flex-1 py-4 text-center text-gray-500';
            document.getElementById('tab-board').className = tab === 'board' ? 'flex-1 py-4 text-center tab-active' : 'flex-1 py-4 text-center text-gray-500';
        };

        // 실시간 데이터 감시 (시험/수행)
        onSnapshot(dataDoc, (snap) => {
            if (snap.exists()) {
                const data = snap.data();
                // 디데이
                const diff = new Date(data.examDate) - new Date();
                const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
                document.getElementById('exam-dday').innerText = days > 0 ? `D-${days}` : (days === 0 ? "Today" : "종료");

                // 수행평가 리스트 & 가장 가까운 수행 찾기
                const listBody = document.getElementById('assessment-list');
                listBody.innerHTML = "";
                const rows = data.rawAssessments.split('\n').filter(r => r.includes('|'));
                
                if(rows.length > 0) {
                    document.getElementById('nearest-assessment').innerText = rows[0].replace('|', ' - ').split('|')[0] + " (" + rows[0].split('|')[2] + ")";
                    rows.forEach(row => {
                        const [sub, con, dat] = row.split('|');
                        listBody.innerHTML += `<tr><td class="p-4 font-bold text-indigo-600">${sub}</td><td class="p-4 text-gray-500">${con}</td><td class="p-4 text-xs font-bold text-blue-500">${dat}</td></tr>`;
                    });
                }

                // 시험 범위
                const cardCont = document.getElementById('range-cards');
                cardCont.innerHTML = "";
                data.rawRanges.split('\n').forEach(line => {
                    if(line.includes(':')) {
                        const [t, d] = line.split(':');
                        cardCont.innerHTML += `<div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm"><h3 class="font-bold text-green-700 mb-1">${t}</h3><p class="text-xs text-gray-500">${d}</p></div>`;
                    }
                });

                // 관리자 창에 기존 데이터 세팅
                document.getElementById('input-date').value = data.examDate;
                document.getElementById('input-assessments').value = data.rawAssessments;
                document.getElementById('input-ranges').value = data.rawRanges;
            }
        });

        // 자유 게시판 실시간 로딩
        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(20));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('post-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                list.innerHTML += `<div class="bg-gray-50 p-4 rounded-xl"><div class="flex justify-between text-xs mb-1"><span class="font-bold text-indigo-600">${p.user}</span><span class="text-gray-400">${p.createdAt?.toDate().toLocaleString().slice(5, 16)}</span></div><p class="text-sm">${p.text}</p></div>`;
            });
        });

        // 글쓰기 함수
        window.addPost = async () => {
            const text = document.getElementById('post-text').value;
            if(!text) return;
            await addDoc(collection(db, "posts"), { text, user: auth.currentUser.displayName, createdAt: new Date() });
            document.getElementById('post-text').value = "";
        };

        // 로그인 감지
        onAuthStateChanged(auth, (user) => {
            const isAdmin = user && user.email === ADMIN_EMAIL;
            document.getElementById('admin-panel').classList.toggle('hidden', !isAdmin);
            document.getElementById('post-input-section').classList.toggle('hidden', !user);
            document.getElementById('post-login-msg').classList.toggle('hidden', !!user);
            document.getElementById('loginBtn').innerText = user ? "로그아웃" : "관리자 로그인";
            document.getElementById('loginBtn').onclick = () => user ? auth.signOut() : signInWithPopup(auth, provider);
        });

        // 관리자 데이터 저장
        window.saveData = async () => {
            await setDoc(dataDoc, {
                examDate: document.getElementById('input-date').value,
                rawAssessments: document.getElementById('input-assessments').value,
                rawRanges: document.getElementById('input-ranges').value,
                lastUpdated: new Date().toLocaleString(),
                updatedBy: auth.currentUser.displayName
            });
            alert("업데이트 완료!");
        };
    </script>
</body>
</html>
